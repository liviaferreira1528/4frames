<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes | 4Frames</title>
    <meta name="description" content="Detalhes do título selecionado no 4Frames.">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/explorar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
    /* =============================================
       PREMIUM DETAILS PAGE STYLES
       ============================================= */

    .details-page {
        min-height: 100vh;
        padding-top: 80px;
    }

    .details-container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 48px 24px 80px;
        display: flex;
        gap: 60px;
        align-items: flex-start;
    }

    /* ---- Poster column ---- */
    .details-poster-col {
        flex-shrink: 0;
        position: relative;
        width: 320px;
    }

    .details-poster {
        width: 100%;
        border-radius: 20px;
        object-fit: cover;
        display: block;
        box-shadow: 0 24px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.06);
        background: linear-gradient(135deg, #1a1a2e, #2a2a3e);
        aspect-ratio: 2/3;
        transition: transform 0.4s ease;
    }

    .details-poster:hover {
        transform: scale(1.015);
    }

    /* Red rating badge (top-left of poster) */
    .details-rating-badge {
        position: absolute;
        top: 14px;
        left: 14px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: rgba(255, 0, 80, 0.15);
        border: 1px solid #ff3d6e;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
        color: #ff6b8a;
        backdrop-filter: blur(6px);
        z-index: 2;
        letter-spacing: 0.03em;
    }

    .details-rating-badge .bi-star-fill {
        color: #f5c518;
        font-size: 0.78rem;
    }

    /* ---- Content column ---- */
    .details-content {
        flex: 1;
        padding-top: 8px;
    }

    .details-category {
        display: inline-block;
        background: rgba(255, 51, 92, 0.12);
        border: 1px solid rgba(255, 51, 92, 0.25);
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 0.82rem;
        color: #ff335c;
        font-weight: 600;
        margin-bottom: 18px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }

    .details-content h1 {
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: 800;
        margin-bottom: 16px;
        line-height: 1.15;
        letter-spacing: -0.5px;
        color: #fff;
    }

    .details-meta {
        display: flex;
        gap: 10px;
        align-items: center;
        color: #a0a0b8;
        font-size: 0.9rem;
        margin-bottom: 28px;
        flex-wrap: wrap;
    }

    .details-meta span {
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }

    .details-meta .meta-sep {
        opacity: 0.35;
    }

    .details-meta .rating {
        color: #f5c518;
        font-weight: 700;
    }

    .details-meta .meta-type {
        background: rgba(255,255,255,.06);
        border: 1px solid rgba(255,255,255,.1);
        padding: 3px 10px;
        border-radius: 10px;
        font-size: 0.8rem;
        color: #c0c0d0;
    }

    .details-description {
        color: #c0c0d0;
        font-size: 1rem;
        line-height: 1.85;
        margin-bottom: 36px;
        max-width: 580px;
    }

    /* ---- Divider ---- */
    .details-divider {
        width: 100%;
        height: 1px;
        background: rgba(255,255,255,.07);
        margin-bottom: 28px;
    }

    .details-buttons {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
    }

    .details-buttons .primary {
        background: #ff335c;
        border: none;
        padding: 14px 32px;
        border-radius: 30px;
        color: #fff;
        font-weight: 700;
        font-size: 0.92rem;
        cursor: pointer;
        transition: background 0.25s, transform 0.25s, box-shadow 0.25s;
        font-family: 'Inter', sans-serif;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 6px 20px rgba(255,51,92,.3);
    }

    .details-buttons .primary:hover {
        background: #ff5477;
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(255,51,92,.5);
    }

    .details-buttons .secondary {
        background: rgba(255,255,255,.08);
        border: 1px solid rgba(255,255,255,.15);
        padding: 14px 32px;
        border-radius: 30px;
        color: #fff;
        font-weight: 500;
        font-size: 0.92rem;
        cursor: pointer;
        transition: background 0.25s, transform 0.25s;
        font-family: 'Inter', sans-serif;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .details-buttons .secondary:hover {
        background: rgba(255,255,255,.16);
        transform: translateY(-2px);
    }

    /* ---- Responsive ---- */
    @media (max-width: 900px) {
        .details-container {
            flex-direction: column;
            gap: 32px;
            padding: 32px 20px 60px;
        }
        .details-poster-col {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }
    }

    @media (max-width: 600px) {
        .details-container { padding: 24px 16px 48px; }
        .details-poster-col { max-width: 240px; }
        .details-content h1 { font-size: 1.8rem; }
        .details-buttons { flex-direction: column; }
        .details-buttons .primary,
        .details-buttons .secondary { justify-content: center; }
    }
    </style>
</head>

<body>
    <div class="overlay"></div>

    <header class="navbar">
        <div class="logo-area">
            <div class="logo-icon"></div>
            <h2 class="logo">4Frames</h2>
        </div>
        <nav class="nav-menu">
            <a href="inicio.html">Início</a>
            <a href="explorar.html">Explorar</a>
            <a href="em-alta.html">Em alta</a>
            <a href="minha-lista.html">Minha Lista</a>
        </nav>
        <div class="header-buttons">
            <button class="search-btn"><span class="search-icon"></span></button>
            <button class="profile-btn" id="btnPerfil">
                <span class="profile-name">Entrar</span>
                <span class="profile-logout-icon"><i class="bi bi-box-arrow-right"></i></span>
            </button>
        </div>
    </header>

    <main class="details-page">
        <section class="details-container gsap-fade-up">

            <!-- Poster column -->
            <div class="details-poster-col">
                <!-- Red rating badge (top-left) -->
                <div class="details-rating-badge" id="detailsBadge">
                    <i class="bi bi-star-fill"></i>
                    <span>—</span>
                </div>

                <img
                    id="moviePoster"
                    class="details-poster"
                    src=""
                    alt="Poster do filme">
            </div>

            <!-- Content column -->
            <div class="details-content">

                <span class="details-category" id="movieGenre"></span>

                <h1 id="movieTitle"></h1>

                <div class="details-meta">
                    <span class="meta-type" id="movieType"></span>
                    <span class="meta-sep">•</span>
                    <span id="movieYear"></span>
                    <span class="meta-sep">•</span>
                    <span class="rating" id="movieRating"></span>
                </div>

                <p class="details-description" id="movieDescription"></p>

                <div class="details-divider"></div>

                <div class="details-buttons">
                    <button id="addButton" class="primary">
                        <i class="bi bi-plus-circle"></i>
                        Adicionar à Lista
                    </button>
                    <button onclick="history.back()" class="secondary">
                        <i class="bi bi-arrow-left"></i>
                        Voltar
                    </button>
                </div>

            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
    <script src="js/smooth-scroll.js"></script>
    <script src="js/animacoes.js"></script>
    <script src="js/busca-overlay.js"></script>
    <script>
        // Auth
        (function() {
            const token    = localStorage.getItem('token');
            const usuario  = JSON.parse(localStorage.getItem('usuario') || '{}');
            const btnPerfil   = document.getElementById('btnPerfil');
            const profileName = btnPerfil.querySelector('.profile-name');

            if (token && usuario.nome) {
                profileName.textContent = usuario.nome;
                btnPerfil.classList.add('logado');
                btnPerfil.addEventListener('click', () => {
                    if (confirm('Deseja sair da sua conta?')) {
                        localStorage.removeItem('token');
                        localStorage.removeItem('usuario');
                        location.reload();
                    }
                });
            } else {
                profileName.textContent = 'Entrar';
                btnPerfil.addEventListener('click', () => {
                    window.location.href = 'login.html';
                });
            }
        })();
    </script>
    <script src="js/localStorage.js"></script>

    <!-- SEARCH OVERLAY -->
    <div id="searchOverlay" class="search-overlay">
        <div class="search-overlay-content">
            <div class="search-overlay-header">
                <input type="text" id="searchOverlayInput" placeholder="Pesquisar filmes ou séries..." autofocus>
                <button id="searchOverlayClose" class="search-overlay-close"><i class="bi bi-x-lg"></i></button>
            </div>
            <div id="searchOverlayResults" class="search-overlay-results"></div>
        </div>
    </div>
</body>
</html>
