<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar | 4Frames</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/explorar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

</head>

<body>
    <div class="overlay"></div>

    <header class="navbar">
        <div class="logo-area">
            <div class="logo-icon"></div>
            <h2 class="logo">4Frames</h2>
        </div>
        <nav class="nav-menu">
            <a href="inicio.html">Início</a>
            <a class="active" href="explorar.html">Explorar</a>
            <a href="em-alta.html">Em alta</a>
            <a href="minha-lista.html">Minha Lista</a>
        </nav>
        <div class="header-buttons">
            <button class="search-btn"><span class="search-icon"></span></button>
            <button class="profile-btn" id="btnPerfil">
                <span class="profile-name">Entrar</span>
                <span class="profile-logout-icon"><i class="bi bi-box-arrow-right"></i></span>
            </button>
        </div>
    </header>

    <main class="explorar-page">
        <section class="explorar-header gsap-fade-up">
            <h1>Explore novos <span>filmes e séries</span></h1>
            <p>Descubra conteúdos, filtre por categoria e monte sua watchlist.</p>
        </section>
        
        <section class="search-container gsap-fade-up">
            <input type="text" id="searchInput" placeholder="Pesquisar filmes ou séries...">
        </section>

        <section class="filters">
            <button class="filter-btn active" data-category="todos">Todos</button>
            <button class="filter-btn" data-category="filme">Filmes</button>
            <button class="filter-btn" data-category="serie">Séries</button>
            <button class="filter-btn" data-category="acao">Ação</button>
            <button class="filter-btn" data-category="drama">Drama</button>
        </section>

        <section class="movies-grid gsap-stagger" id="moviesGrid"></section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <span class="logo-icon"></span>
                <span>4Frames</span>
            </div>
            <div class="footer-links">
                <a href="inicio.html">Início</a>
                <a href="explorar.html">Explorar</a>
                <a href="em-alta.html">Em alta</a>
                <a href="minha-lista.html">Minha Lista</a>
            </div>
            <div class="footer-copy">
                © 2026 4Frames - Sua watchlist pessoal
            </div>
        </div>
    </footer>

    <!-- BOTÃO VOLTAR AO TOPO -->
    <button class="scroll-top-btn" id="scrollTopBtn"></button>

    <script src="js/app.js"></script>
    <script src="js/smooth-scroll.js"></script>
    <script src="js/animacoes.js"></script>
    <script src="js/busca-overlay.js"></script>
    <script src="js/explorar.js"></script>
    
    <script>
        const token = localStorage.getItem('token');
        const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
        const btnPerfil = document.getElementById('btnPerfil');
        const profileName = btnPerfil.querySelector('.profile-name');
        
        if (token && usuario.nome) {
            profileName.textContent = usuario.nome;
            btnPerfil.classList.add('logado');
            btnPerfil.addEventListener('click', () => {
                if (confirm('Deseja sair da sua conta?')) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('usuario');
                    location.reload();
                }
            });
        } else {
            profileName.textContent = 'Entrar';
            btnPerfil.addEventListener('click', () => {
                window.location.href = 'login.html';
            });
        }
        
        const scrollBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollBtn.classList.add('show');
            } else {
                scrollBtn.classList.remove('show');
            }
        });
        
        scrollBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>

    <!-- SEARCH OVERLAY -->
    <div id="searchOverlay" class="search-overlay">
        <div class="search-overlay-content">
            <div class="search-overlay-header">
                <input type="text" id="searchOverlayInput" placeholder="Pesquisar filmes ou séries..." autofocus>
                <button id="searchOverlayClose" class="search-overlay-close"><i class="bi bi-x-lg"></i></button>
            </div>
            <div id="searchOverlayResults" class="search-overlay-results"></div>
        </div>
    </div>
</body>
</html>
