<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minha Lista | 4Frames</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
        .watchlist-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.3s;
            align-items: center;
        }
        .watchlist-card:hover {
            border-color: #ff335c;
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.08);
        }
        .watchlist-poster {
            width: 80px;
            height: 110px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
        }
        .watchlist-info {
            flex: 1;
        }
        .watchlist-info h4 {
            margin: 0 0 5px 0;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .watchlist-info p {
            margin: 0 0 10px 0;
            color: #c9cbd5;
            font-size: 0.85rem;
        }
        .watchlist-status {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .status-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .status-select:hover {
            border-color: #ff335c;
        }
        .status-select:focus {
            outline: none;
            border-color: #ff335c;
        }
        .remove-btn {
            background: rgba(255, 51, 92, 0.15);
            border: 1px solid rgba(255, 51, 92, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            color: #ff335c;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.85rem;
        }
        .remove-btn:hover {
            background: #ff335c;
            color: white;
            border-color: #ff335c;
        }
        #contadorLista {
            color: #ff335c;
            font-weight: 500;
            font-size: 1rem;
        }
        .lista-page {
            padding-top: 100px;
        }
        .lista-header {
            padding: 0 20px;
        }
        #watchlistContainer {
            padding-bottom: 60px;
        }
        .lista-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .lista-header h1 span {
            color: #ff335c;
        }
        .lista-vazia {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .lista-vazia h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #c9cbd5;
        }
        .lista-vazia p {
            color: #888;
        }
        .lista-vazia a {
            color: #ff335c;
            text-decoration: none;
            font-weight: 600;
        }
        .lista-vazia a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .watchlist-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 20px;
            }
            .watchlist-status {
                justify-content: center;
            }
            .watchlist-poster {
                width: 100px;
                height: 130px;
            }
            .lista-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    
            <header class="navbar">
                <div class="logo-area">
                    <div class="logo-icon"></div>
                    <h2 class="logo">4Frames</h2>
                </div>
                <nav class="nav-menu">
                    <a href="inicio.html">Início</a>
                    <a href="explorar.html">Explorar</a>
                    <a href="em-alta.html">Em alta</a>
                    <a class="active" href="minha-lista.html">Minha Lista</a>
                </nav>
                <div class="header-buttons">
                    <button class="search-btn"><span class="search-icon"></span></button>
                    <button class="profile-btn" id="btnPerfil">
                        <span class="profile-name">Entrar</span>
                        <span class="profile-logout-icon"><i class="bi bi-box-arrow-right"></i></span>
                    </button>
                </div>
            </header>
            
            <main class="lista-page">
                <section class="lista-header gsap-fade-up">
                    <h1>Minha <span>Watchlist</span></h1>
                    <p id="contadorLista" style="margin-top: 8px;">Carregando...</p>
                </section>
                <section id="watchlistContainer" class="watchlist-grid gsap-stagger"></section>
            </main>
            
            <footer class="footer">
                <div class="footer-content">
                    <div class="footer-logo"><span class="logo-icon"></span><span>4Frames</span></div>
                    <div class="footer-links">
                        <a href="inicio.html">Início</a>
                        <a href="explorar.html">Explorar</a>
                        <a href="em-alta.html">Em alta</a>
                        <a href="minha-lista.html">Minha Lista</a>
                    </div>
                    <div class="footer-copy">© 2026 4Frames - Sua watchlist pessoal</div>
                </div>
            </footer>
    
    <button class="scroll-top-btn" id="scrollTopBtn"></button>

    <script src="js/app.js"></script>
    <script src="js/smooth-scroll.js"></script>
    <script src="js/animacoes.js"></script>
    <script src="js/busca-overlay.js"></script>
    <script>
        // ==========================================
        // VERIFICAR SE ESTÁ LOGADO
        // ==========================================
        
        const token = localStorage.getItem('token');
        const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
        
        if (!token || !usuario.nome) {
            alert('Faça login para ver sua lista!');
            window.location.href = 'login.html';
        }
        
        const btnPerfil = document.getElementById('btnPerfil');
        const profileName = btnPerfil.querySelector('.profile-name');
        
        if (token && usuario.nome) {
            profileName.textContent = usuario.nome;
            btnPerfil.classList.add('logado');
            btnPerfil.addEventListener('click', () => {
                if (confirm('Deseja sair da sua conta?')) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('usuario');
                    location.reload();
                }
            });
        } else {
            profileName.textContent = 'Entrar';
            btnPerfil.addEventListener('click', () => {
                window.location.href = 'login.html';
            });
        }
        
        console.log(`Usuário: ${usuario.nome}`);
        
        // ==========================================
        // FUNÇÃO PARA BUSCAR WATCHLIST
        // ==========================================
        
        async function buscarWatchlist() {
            try {
                const response = await fetch('/api/watchlist', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        alert('Sua sessão expirou. Faça login novamente.');
                        localStorage.removeItem('token');
                        localStorage.removeItem('usuario');
                        window.location.href = 'login.html';
                        return [];
                    }
                    throw new Error('Erro ao buscar lista');
                }
                
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao carregar sua lista.');
                return [];
            }
        }
        
        // ==========================================
        // FUNÇÃO PARA REMOVER DA WATCHLIST (CORRIGIDA)
        // ==========================================
        
        async function removerDaLista(watchlistId) {
            try {
                const response = await fetch(`/api/watchlist/${watchlistId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Filme removido da sua lista!');
                    carregarLista(); // Recarregar a lista
                } else {
                    alert(data.erro || 'Erro ao remover');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao conectar com o servidor');
            }
        }
        
        // ==========================================
        // FUNÇÃO PARA ATUALIZAR STATUS
        // ==========================================
        
        async function atualizarStatus(watchlistId, status) {
            try {
                const response = await fetch(`/api/watchlist/${watchlistId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    carregarLista(); // Recarregar a lista
                } else {
                    alert(data.erro || 'Erro ao atualizar status');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao conectar com o servidor');
            }
        }
        
        // ==========================================
        // FUNÇÃO PARA RENDERIZAR A LISTA
        // ==========================================
        
        async function carregarLista() {
            const container = document.getElementById('watchlistContainer');
            const contador = document.getElementById('contadorLista');
            
            const items = await buscarWatchlist();
            
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="lista-vazia">
                        <h3><i class="bi bi-envelope-open"></i> Sua lista está vazia</h3>
                        <p>Vá ao <a href="explorar.html">Explorar</a> e adicione filmes!</p>
                    </div>
                `;
                contador.textContent = 'Nenhum filme na lista';
                return;
            }
            
            const qtdQueroVer = items.filter(i => i.status === 'quero_ver').length;
            const qtdAssistindo = items.filter(i => i.status === 'assistindo').length;
            const qtdAssistido = items.filter(i => i.status === 'assistido').length;
            
            contador.innerHTML = `<i class="bi bi-card-list"></i> ${items.length} filmes | <i class="bi bi-hourglass-split"></i> ${qtdQueroVer} quero ver | <i class="bi bi-play-fill"></i> ${qtdAssistindo} assistindo | <i class="bi bi-check-circle-fill"></i> ${qtdAssistido} assistido`;
            container.innerHTML = '';
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'watchlist-card';
                card.innerHTML = `
                    <img src="${item.poster_url || 'assets/posters/default.jpg'}" class="watchlist-poster" alt="${item.titulo}" onerror="this.src='assets/posters/default.jpg'">
                    <div class="watchlist-info">
                        <h4>${item.titulo}</h4>
                        <p>${item.ano || 'Ano não informado'} • ${item.genero || 'Gênero não informado'}</p>
                        <div class="watchlist-status">
                            <select class="status-select" data-id="${item.id}">
                                <option value="quero_ver" ${item.status === 'quero_ver' ? 'selected' : ''}><i class="bi bi-hourglass-split"></i> Quero ver</option>
                                <option value="assistindo" ${item.status === 'assistindo' ? 'selected' : ''}><i class="bi bi-play-fill"></i> Assistindo</option>
                                <option value="assistido" ${item.status === 'assistido' ? 'selected' : ''}><i class="bi bi-check-circle-fill"></i> Já assisti</option>
                            </select>
                            <button class="remove-btn" data-id="${item.id}"><i class="bi bi-trash3-fill"></i> Remover</button>
                        </div>
                    </div>
                `;
                
                // Evento de mudança de status
                card.querySelector('.status-select').addEventListener('change', (e) => {
                    const watchlistId = parseInt(e.target.dataset.id);
                    const status = e.target.value;
                    atualizarStatus(watchlistId, status);
                });
                
                // Evento de remover (agora usa o watchlistId, não o filmeId)
                card.querySelector('.remove-btn').addEventListener('click', (e) => {
                    const watchlistId = parseInt(e.target.dataset.id);
                    if (confirm('Tem certeza que quer remover este filme?')) {
                        removerDaLista(watchlistId);
                    }
                });
                
                container.appendChild(card);
            });
        }
        
        // ==========================================
        // BOTÃO VOLTAR AO TOPO
        // ==========================================
        
        const scrollBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollBtn.classList.add('show');
            } else {
                scrollBtn.classList.remove('show');
            }
        });
        
        scrollBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        
        // ==========================================
        // CARREGAR A LISTA
        // ==========================================
        
        carregarLista();
    </script>

    <!-- SEARCH OVERLAY -->
    <div id="searchOverlay" class="search-overlay">
        <div class="search-overlay-content">
            <div class="search-overlay-header">
                <input type="text" id="searchOverlayInput" placeholder="Pesquisar filmes ou séries..." autofocus>
                <button id="searchOverlayClose" class="search-overlay-close"><i class="bi bi-x-lg"></i></button>
            </div>
            <div id="searchOverlayResults" class="search-overlay-results"></div>
        </div>
    </div>
</body>
</html>
