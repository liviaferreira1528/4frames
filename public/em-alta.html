<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Alta | 4Frames</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/explorar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

</head>

<body>
    <div class="overlay"></div>

    <header class="navbar">
        <div class="logo-area">
            <div class="logo-icon"></div>
            <h2 class="logo">4Frames</h2>
        </div>
        <nav class="nav-menu">
            <a href="inicio.html">Início</a>
            <a href="explorar.html">Explorar</a>
            <a class="active" href="em-alta.html">Em alta</a>
            <a href="minha-lista.html">Minha Lista</a>
        </nav>
        <div class="header-buttons">
            <button class="search-btn"><span class="search-icon"></span></button>
            <button class="profile-btn" id="btnPerfil">
                <span class="profile-name">Entrar</span>
                <span class="profile-logout-icon"><i class="bi bi-box-arrow-right"></i></span>
            </button>
        </div>
    </header>

    <main class="explorar-page">
        <section class="explorar-header gsap-fade-up">
            <h1><i class="bi bi-camera-reels-fill"></i> O que está <span>em alta</span></h1>
            <p>Descubra os filmes e séries mais populares do momento.</p>
        </section>
        
        <section class="trend-banner gsap-fade-up" id="trendBanner"></section>
        <section class="movies-grid gsap-stagger" id="trendingGrid"></section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <span class="logo-icon"></span>
                <span>4Frames</span>
            </div>
            <div class="footer-links">
                <a href="inicio.html">Início</a>
                <a href="explorar.html">Explorar</a>
                <a href="em-alta.html">Em alta</a>
                <a href="minha-lista.html">Minha Lista</a>
            </div>
            <div class="footer-copy">
                © 2026 4Frames - Sua watchlist pessoal
            </div>
        </div>
    </footer>

    <button class="scroll-top-btn" id="scrollTopBtn"></button>

    <script src="js/app.js"></script>
    <script src="js/smooth-scroll.js"></script>
    <script src="js/animacoes.js"></script>
    <script src="js/busca-overlay.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/busca.js"></script>
    
    <script>
        const token = localStorage.getItem('token');
        const usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
        const btnPerfil = document.getElementById('btnPerfil');
        const profileName = btnPerfil.querySelector('.profile-name');
        
        if (token && usuario.nome) {
            profileName.textContent = usuario.nome;
            btnPerfil.classList.add('logado');
            btnPerfil.addEventListener('click', () => {
                if (confirm('Deseja sair da sua conta?')) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('usuario');
                    location.reload();
                }
            });
        } else {
            profileName.textContent = 'Entrar';
            btnPerfil.addEventListener('click', () => {
                window.location.href = 'login.html';
            });
        }
        
        // ==========================================
        // BOTÃO VOLTAR AO TOPO
        // ==========================================
        
        const scrollBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollBtn.classList.add('show');
            } else {
                scrollBtn.classList.remove('show');
            }
        });
        
        scrollBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ==========================================
        // CARREGAR FILMES EM ALTA
        // ==========================================
        
        async function carregarEmAlta() {
            const grid = document.getElementById('trendingGrid');
            const banner = document.getElementById('trendBanner');
            
            try {
                const response = await fetch('/api/titulos');
                const filmes = await response.json();
                
                // Filtrar os 6 mais bem avaliados
                const topFilmes = filmes
                    .sort((a, b) => parseFloat(b.nota) - parseFloat(a.nota))
                    .slice(0, 6);
                
                // Banner com o primeiro filme
                if (topFilmes.length > 0) {
                    const primeiro = topFilmes[0];
                    banner.innerHTML = `
                        <div class="trend-content">
                            <div class="trend-tag"><i class="bi bi-star-fill"></i> ${primeiro.nota} • ${primeiro.ano}</div>
                            <h2 class="trend-title">${primeiro.titulo}</h2>
                            <p class="trend-description">${primeiro.sinopse || 'Sinopse não disponível'}</p>
                            <button class="trend-btn" onclick="window.location.href='detalhes.html?id=${primeiro.id}'">Ver mais</button>
                        </div>
                    `;
                    banner.style.backgroundImage = `url('${primeiro.poster_url || 'assets/posters/default.jpg'}')`;
                }
                
                // Grid com os outros filmes
                grid.innerHTML = '';
                topFilmes.forEach(filme => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `
                        <img src="${filme.poster_url || 'assets/posters/default.jpg'}" class="movie-poster" alt="${filme.titulo}" onerror="this.src='assets/posters/default.jpg'">
                        <div class="movie-content">
                            <h3 class="movie-title">${filme.titulo}</h3>
                            <div class="movie-info">
                                <span>${filme.ano || 'Ano não informado'}</span>
                                <span class="movie-rating"><i class="bi bi-star-fill"></i> ${filme.nota || '0'}</span>
                            </div>
                                <button class="add-btn" data-id="${filme.id}"><i class="bi bi-plus-lg"></i> Adicionar à lista</button>
                        </div>
                    `;
                    
                    // Abrir modal ao clicar no card
                    card.addEventListener('click', (e) => {
                        if (e.target.classList.contains('add-btn')) return;
                        abrirModalFilme(filme);
                    });
                    
                    // Adicionar à lista
                    card.querySelector('.add-btn').addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const token = localStorage.getItem('token');
                        if (!token) {
                            alert('Faça login para adicionar filmes!');
                            window.location.href = 'login.html';
                            return;
                        }
                        
                        try {
                            const response = await fetch('/api/watchlist', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${token}`
                                },
                                body: JSON.stringify({ titulo_id: filme.id })
                            });
                            
                            const data = await response.json();
                            if (response.ok) {
                                alert(`${filme.titulo} adicionado à sua lista!`);
                            } else {
                                alert(data.erro || 'Erro ao adicionar');
                            }
                        } catch (error) {
                            console.error('Erro:', error);
                            alert('Erro ao conectar com o servidor');
                        }
                    });
                    
                    grid.appendChild(card);
                });
                
            } catch (error) {
                console.error('Erro ao carregar em alta:', error);
                grid.innerHTML = '<div style="text-align:center;padding:50px;color:#888;">Erro ao carregar os filmes em alta <i class="bi bi-emoji-frown-fill"></i></div>';
            }
        }
        
        carregarEmAlta();
    </script>
    <!-- SEARCH OVERLAY -->
    <div id="searchOverlay" class="search-overlay">
        <div class="search-overlay-content">
            <div class="search-overlay-header">
                <input type="text" id="searchOverlayInput" placeholder="Pesquisar filmes ou séries..." autofocus>
                <button id="searchOverlayClose" class="search-overlay-close"><i class="bi bi-x-lg"></i></button>
            </div>
            <div id="searchOverlayResults" class="search-overlay-results"></div>
        </div>
    </div>
</body>
</html>
